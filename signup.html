<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic page setup -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | FuelFit Meals</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar">
        <h1 class="logo">FuelFit Meals</h1>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="meals.html">Meals</a></li>
            <li><a href="quiz.html">Diet Quiz</a></li>
            <!--  nav item will be controlled by JavaScript -->
            <li id="authNavItem"></li>
        </ul>
    </nav>

    <!-- Sign up page content -->
    <main class="auth-page">
        <section class="auth-card">
            <h2>Create Your Account</h2>
            <p class="auth-subtext">
                Sign up to save your information and get started with FuelFit Meals.
            </p>

            <!-- Sign up form -->
            <form id="signupForm" class="auth-form">
                <label for="signupName">Full Name</label>
                <input type="text" id="signupName" placeholder="Enter your full name" required>

                <label for="signupEmail">Email</label>
                <input type="email" id="signupEmail" placeholder="Enter your email" required>

                <label for="signupPassword">Password</label>
                <input type="password" id="signupPassword" placeholder="Create a password" required>

                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm your password" required>

                <button type="submit" class="auth-btn">Sign Up</button>
            </form>

            <!-- Message area for JavaScript -->
            <p id="signupMessage" class="form-message"></p>

            <!-- Link to login page -->
            <p class="auth-switch-text">
                Already have an account?
                <a href="login.html">Log In</a>
            </p>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <p>© 2026 FuelFit Meals</p>
    </footer>

    <!-- JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
