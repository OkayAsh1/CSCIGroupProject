<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta-name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diet Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar">
        <h1 class="logo">FuelFit Meals</h1>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="meals.html">Meals</a></li>
            <li><a href="quiz.html">Diet Quiz</a></li>
        </ul>
    </nav>

    <section class="quiz-section">
        <h2>Diet Preference Quiz</h2>

        <!-- Updated form to better match everything -->
        <form class="quiz-form">

            <div class="form-group">
                <label>Diet Type:</label>
                <select>
                    <option>Regular</option>
                    <option>Vegan</option>
                    <option>Vegetarian</option>
                    <option>Keto</option>
                    <option>High Protein</option>
                </select>
            </div>

            <div class="form-group">
                <label>Daily Calorie Goal:</label>
                <input type="number" placeholder="e.g., 1800">
            </div>

            <div class="form-group">
                <label>Food Restrictions:</label>
                <label><input type="checkbox"> Dairy‑Free</label>
                <label><input type="checkbox"> Gluten‑Free</label>
                <label><input type="checkbox"> Nut‑Free</label>
            </div>

            <button type="submit" class="submit-btn">Submit Quiz</button>
        </form>
    </section>

    <script src="script.js"></script>
</body>
</html>
